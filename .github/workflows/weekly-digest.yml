name: Greek Weekly Positive News

on:
  schedule:
    # Monday and Thursday at 05:00 UTC = 08:00 Greece summer (EEST/UTC+3)
    - cron: '0 5 * * 1'
    - cron: '0 5 * * 4'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_weekly_digest.py --no-deploy

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: greek-digest-audio
          path: audio/*.mp3
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          enable_jekyll: false
          commit_message: "Weekly digest — ${{ github.run_id }}"
